name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      service:
        description: 'Deploy service project name or all'
        required: true
        default: all
        type: string

permissions:
  actions: read
  contents: read

jobs:
  verify:
    name: Verify projects
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d auth"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/auth
      PORT: 3000
      JWT_SECRET: ci-only-secret
      JWT_EXPIRATION_MS: 900000
      CORS_ORIGINS: http://localhost:3000

    outputs:
      deploy_matrix: ${{ steps.deploy_matrix.outputs.matrix }}
      has_deployments: ${{ steps.deploy_matrix.outputs.has_deployments }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Validate deployment manifest
        shell: bash
        run: |
          set -euo pipefail

          jq -e '
            type == "array" and
            length > 0 and
            all(.[];
              (.project | type) == "string" and
              (.imageName | type) == "string" and
              (.dockerfile | type) == "string" and
              (.composeService | type) == "string" and
              (.imageTagEnv | type) == "string" and
              (.ssmPath | type) == "string" and
              (.ssmPath | startswith("/")) and
              (.ssmPath | endswith("/") | not) and
              (.secureParameters | type) == "array" and
              (.secureParameters | length) > 0 and
              all(.secureParameters[];
                type == "string" and test("^[A-Z_][A-Z0-9_]*$")
              ) and
              (.secureParameters | length) ==
              (.secureParameters | unique | length) and
              (.runtimeEnvFileEnv | type) == "string" and
              (.migrationCommand | type) == "string"
            ) and
            ([.[].project] | length) == ([.[].project] | unique | length) and
            ([.[].composeService] | length) == ([.[].composeService] | unique | length) and
            ([.[].imageTagEnv] | length) == ([.[].imageTagEnv] | unique | length) and
            ([.[].runtimeEnvFileEnv] | length) == ([.[].runtimeEnvFileEnv] | unique | length)
          ' .github/deploy-services.json > /dev/null

          while IFS= read -r dockerfile; do
            [[ -f "$dockerfile" ]] || {
              echo "Dockerfile not found: $dockerfile" >&2
              exit 1
            }
          done < <(jq -r '.[].dockerfile' .github/deploy-services.json)

      - name: Validate Compose configuration
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p .ci/certs
          : > .ci/runtime.env
          : > .ci/certs/global-bundle.pem

          jq -r --arg runtime_env "$PWD/.ci/runtime.env" \
            '.[] | .imageTagEnv + "=validation", .runtimeEnvFileEnv + "=" + $runtime_env' \
            .github/deploy-services.json > .ci/deployment.env

          compose_services="$(
            PIXAERON_CERTS_DIR="$PWD/.ci/certs" \
            docker compose --env-file .ci/deployment.env \
              -f docker-compose.production.yaml \
              config --services
          )"

          while IFS= read -r service; do
            grep -Fxq "$service" <<< "$compose_services" || {
              echo "Compose service not found: $service" >&2
              exit 1
            }
          done < <(jq -r '.[].composeService' .github/deploy-services.json)

      - name: Set affected base and head SHAs
        if: github.event_name != 'workflow_dispatch'
        uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint, test, and build affected projects
        if: github.event_name != 'workflow_dispatch'
        run: npx nx affected -t lint test build

      - name: Run affected end-to-end tests
        if: github.event_name != 'workflow_dispatch'
        run: npx nx affected -t e2e

      - name: Verify selected deployable projects
        if: github.event_name == 'workflow_dispatch'
        env:
          SERVICE_INPUT: ${{ inputs.service }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$SERVICE_INPUT" == "all" ]]; then
            projects="$(jq -r '.[].project' .github/deploy-services.json | paste -sd, -)"
          else
            jq -e --arg project "$SERVICE_INPUT" \
              'any(.[]; .project == $project)' \
              .github/deploy-services.json > /dev/null
            projects="$SERVICE_INPUT"
          fi

          npx nx run-many -t lint test build --projects="$projects"
          npx nx run-many -t e2e

      - name: Build deployable Docker images
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail

          affected="$(npx nx show projects --affected --json)"

          while IFS=$'\t' read -r project dockerfile; do
            docker build --file "$dockerfile" --tag "pixaeron-ci:$project" .
          done < <(
            jq -r --argjson affected "$affected" '
              .[] |
              select(.project as $project | ($affected | index($project))) |
              [.project, .dockerfile] | @tsv
            ' .github/deploy-services.json
          )

      - name: Build deployment matrix
        id: deploy_matrix
        env:
          SERVICE_INPUT: ${{ inputs.service || 'all' }}
        shell: bash
        run: |
          set -euo pipefail

          workspace_projects="$(npx nx show projects --json)"
          jq -e --argjson workspace_projects "$workspace_projects" '
            all(.[];
              .project as $project |
              ($workspace_projects | index($project)) != null
            )
          ' .github/deploy-services.json > /dev/null || {
            echo 'Deployment manifest contains an unknown Nx project.' >&2
            exit 1
          }

          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            selected='[]'
          elif [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            if [[ "$SERVICE_INPUT" == "all" ]]; then
              selected="$(jq -c '.' .github/deploy-services.json)"
            else
              selected="$(jq -c --arg project "$SERVICE_INPUT" \
                '[.[] | select(.project == $project)]' \
                .github/deploy-services.json)"
            fi
          else
            affected="$(npx nx show projects --affected --json)"
            selected="$(jq -c --argjson affected "$affected" \
              '[.[] | select(.project as $project | ($affected | index($project)))]' \
              .github/deploy-services.json)"
          fi

          matrix="$(jq -cn --argjson include "$selected" '{include: $include}')"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

          if jq -e 'length > 0' <<< "$selected" > /dev/null; then
            echo "has_deployments=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_deployments=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy ${{ matrix.project }}
    needs: verify
    if: >-
      needs.verify.result == 'success' &&
      needs.verify.outputs.has_deployments == 'true' &&
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: pixaeron-production
      cancel-in-progress: false
      queue: max

    permissions:
      actions: read
      contents: read
      id-token: write
      packages: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.verify.outputs.deploy_matrix) }}

    env:
      IMAGE_TAG: sha-${{ github.sha }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.imageName }}:${{ env.IMAGE_TAG }}
            ${{ matrix.imageName }}:latest
          cache-from: type=gha,scope=${{ matrix.project }}
          cache-to: type=gha,mode=max,scope=${{ matrix.project }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Generate runtime env file
        env:
          SSM_PATH: ${{ matrix.ssmPath }}
          SECURE_PARAMETERS: ${{ toJson(matrix.secureParameters) }}
        shell: bash
        run: |
          set -euo pipefail

          parameters="$(
            aws ssm get-parameters-by-path \
              --path "$SSM_PATH" \
              --recursive \
              --with-decryption \
              --query 'Parameters' \
              --output json
          )"

          prefix="$SSM_PATH/"
          jq -e --arg prefix "$prefix" '
            length > 0 and
            all(.[];
              (.Name | startswith($prefix)) and
              ((.Name | ltrimstr($prefix)) | test("^[A-Z_][A-Z0-9_]*$")) and
              (.Value | contains("\u0000") | not) and
              (.Value | contains("\n") | not) and
              (.Value | contains("\r") | not)
            ) and
            ([.[] | .Name | ltrimstr($prefix)] | length) ==
            ([.[] | .Name | ltrimstr($prefix)] | unique | length)
          ' <<< "$parameters" > /dev/null || {
            echo "No valid, unique environment parameters found under $SSM_PATH." >&2
            exit 1
          }

          while IFS= read -r key; do
            parameter_type="$(
              jq -r --arg name "$prefix$key" '
                first(.[] | select(.Name == $name) | .Type) // ""
              ' <<< "$parameters"
            )"

            if [[ "$parameter_type" != 'SecureString' ]]; then
              echo "$prefix$key must exist and use the SecureString type." >&2
              exit 1
            fi
          done < <(jq -r '.[]' <<< "$SECURE_PARAMETERS")

          umask 077
          : > service.env

          while IFS=$'\t' read -r name encoded_value; do
            key="${name#"$prefix"}"
            value="$(printf '%s' "$encoded_value" | base64 --decode)"
            printf '%s=%s\n' "$key" "$value" >> service.env
          done < <(
            jq -r 'sort_by(.Name)[] | [.Name, (.Value | @base64)] | @tsv' \
              <<< "$parameters"
          )

      - name: Configure SSH
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        shell: bash
        run: |
          set -euo pipefail

          umask 077
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Upload deployment files
        env:
          COMPOSE_SERVICE: ${{ matrix.composeService }}
        shell: bash
        run: |
          set -euo pipefail

          ssh -o BatchMode=yes "$VPS_USER@$VPS_HOST" \
            'install -d -m 755 /opt/pixaeron'

          scp -o BatchMode=yes \
            docker-compose.production.yaml \
            "$VPS_USER@$VPS_HOST:/opt/pixaeron/docker-compose.production.yaml.next"

          scp -p -o BatchMode=yes \
            service.env \
            "$VPS_USER@$VPS_HOST:/opt/pixaeron/$COMPOSE_SERVICE.env.next"

          scp -o BatchMode=yes \
            scripts/deploy-service.sh \
            "$VPS_USER@$VPS_HOST:/opt/pixaeron/deploy-service.sh"

      - name: Log in to GHCR on VPS
        env:
          GHCR_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          printf '%s' "$GHCR_TOKEN" | ssh -o BatchMode=yes "$VPS_USER@$VPS_HOST" \
            "docker login ghcr.io -u '${{ github.actor }}' --password-stdin"

      - name: Deploy service on VPS
        env:
          COMPOSE_SERVICE: ${{ matrix.composeService }}
          IMAGE_TAG_ENV: ${{ matrix.imageTagEnv }}
          MIGRATION_COMMAND: ${{ matrix.migrationCommand }}
          RUNTIME_ENV_FILE_ENV: ${{ matrix.runtimeEnvFileEnv }}
        shell: bash
        run: |
          set -euo pipefail

          printf -v remote_command '%q ' \
            bash /opt/pixaeron/deploy-service.sh \
            "$COMPOSE_SERVICE" \
            "$IMAGE_TAG_ENV" \
            "$IMAGE_TAG" \
            "$RUNTIME_ENV_FILE_ENV" \
            "$MIGRATION_COMMAND"

          ssh -o BatchMode=yes "$VPS_USER@$VPS_HOST" "$remote_command"
