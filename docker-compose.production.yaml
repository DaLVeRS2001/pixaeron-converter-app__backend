name: pixaeron

services:
  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - 'yes'
      - --appendfsync
      - everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '5'

  auth:
    image: ghcr.io/dalvers2001/pixaeron-auth:${AUTH_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - path: ${AUTH_RUNTIME_ENV_FILE:-/opt/pixaeron/auth.env}
        format: raw
    environment:
      NODE_ENV: production
      PORT: 3000
      REDIS_URL: redis://redis:6379
    ports:
      - '127.0.0.1:3000:3000'
    volumes:
      - ${PIXAERON_CERTS_DIR:-/opt/pixaeron/certs}/global-bundle.pem:/app/certs/global-bundle.pem:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          fetch('http://127.0.0.1:3000/auth/health').then((response) => {
            if (!response.ok) process.exit(1);
          }).catch(() => process.exit(1));
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '5'

volumes:
  redis_data:
