---
all:
  children:
    application_vps:
      hosts:
        production:
          ansible_host: YOUR_LIGHTSAIL_STATIC_IP
          ansible_user: ubuntu
          ansible_ssh_private_key_file: /home/YOUR_WSL_USER/.ssh/pixaeron-prod
      vars:
        deploy_user: pixaeron
        deploy_public_key: >-
          ssh-ed25519 REPLACE_WITH_GITHUB_ACTIONS_PUBLIC_KEY github-actions@pixaeron
        swap_size_mb: 2048
        swap_swappiness: 10
